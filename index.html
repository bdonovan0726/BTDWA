<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Observations</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 10px;
        background: #f4f6f8;
    }

    h2 {
        text-align: center;
        margin-bottom: 5px;
    }

    .status {
        text-align: center;
        margin-bottom: 15px;
        font-size: 14px;
        color: #666;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .station-card {
        width: 100%;
        max-width: 500px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .station-header {
        background: #0077cc;
        color: white;
        font-weight: bold;
        padding: 10px;
        text-align: center;
        font-size: 16px;
        cursor: pointer;
        position: relative;
    }

    /* Tooltip */
    .tooltip {
        position: absolute;
        bottom: -45px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: white;
        padding: 6px 10px;
        border-radius: 5px;
        font-size: 12px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 10;
    }

    .station-header:hover .tooltip {
        opacity: 1;
    }

    .tooltip.show {
        opacity: 1;
        pointer-events: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td {
        padding: 8px 10px;
        border-bottom: 1px solid #eee;
    }

    td:first-child {
        font-weight: 600;
        color: #555;
        width: 50%;
    }

    td:last-child {
        text-align: right;
    }

    tr:nth-child(even) {
        background: #fafafa;
    }

    .fresh {
        background: #e6ffed;
    }

    @media (max-width: 768px) {
        body {
            font-size: 13px;
        }
    }
</style>

</head>

<body>

<h2>Weather Observations</h2>
<div class="status" id="status">Loading data...</div>

<div class="container" id="container"></div>

<script>
function formatTime(val) {
    try {
        let d;

        if (!isNaN(val)) {
            d = new Date(parseFloat(val) * 1000);
        } else {
            d = new Date(val);
        }

        return isNaN(d) ? "Invalid Date" : d.toLocaleString();
    } catch {
        return "Invalid Date";
    }
}

function formatTemp(celsius) {
    if (celsius == null || isNaN(celsius)) return "";

    const c = Math.round(celsius);
    const f = Math.round((celsius * 9/5) + 32);

    return `${c}°C / ${f}°F`;
}

function formatWind(mps) {
    if (mps == null || isNaN(mps)) return "";

    const mph = Math.round(mps * 2.237);
    return `${mph} mph`;
}

async function loadData() {
    const status = document.getElementById("status");
    const container = document.getElementById("container");

    try {
        const response = await fetch("http://localhost:5000/observations");
        const data = await response.json();

        if (!data || data.length === 0) {
            container.innerHTML = "<p>No data available</p>";
            status.innerText = "No data returned from API";
            return;
        }

        const now = Date.now();

        const enhanced = data.map(row => {
            let ts = row.Timestamp;
            let age = "";

            if (!isNaN(ts)) {
                const diff = now - (parseFloat(ts) * 1000);
                const mins = Math.floor(diff / 60000);
                age = mins < 1 ? "just now" : `${mins} min ago`;
            }

            return { ...row, Age: age };
        });

        container.innerHTML = enhanced.map(row => {
            const isFresh = row.Age.includes("just") || row.Age.startsWith("0");

            const rows = Object.entries(row)
                .filter(([key]) => 
                    key !== "StationID" && 
                    key !== "StationName" && 
                    key !== "StationComments"
                )
                .map(([key, val]) => {

                    const k = key.toLowerCase();

                    if (k.includes("time") && val) {
                        val = formatTime(val);
                    }

                    if (k === "humidity" && val != null) {
                        val = `${Math.round(val)}%`;
                    }

                    if (
                        k === "temp" ||
                        k === "temperature" ||
                        k.includes("heatindex") ||
                        k.includes("windchill")
                    ) {
                        val = formatTemp(val);
                    }

                    if (k.includes("windspeed") || k.includes("windgust")) {
                        val = formatWind(val);
                    }

                    if (k === "pressure" && val != null) {
                        val = `${Math.round(val)} hPa`;
                    }

                    return `
                        <tr>
                            <td>${key}</td>
                            <td>${val ?? ""}</td>
                        </tr>
                    `;
                }).join("");

            return `
                <div class="station-card">
                    <div class="station-header" onclick="toggleTooltip(this)">
                        ${row.StationName || row.StationID || "Unknown Station"}
                        <div class="tooltip">
                            ${row.StationComments || ""}
                        </div>
                    </div>
                    <table class="${isFresh ? 'fresh' : ''}">
                        ${rows}
                    </table>
                </div>
            `;
        }).join("");

        status.innerText = `Last updated: ${new Date().toLocaleTimeString()}`;

    } catch (err) {
        console.error(err);
        container.innerHTML = "<p>Error loading data</p>";
        status.innerText = "Error connecting to API";
    }
}

// Mobile tap support
function toggleTooltip(el) {
    const tip = el.querySelector(".tooltip");

    // close others
    document.querySelectorAll(".tooltip").forEach(t => {
        if (t !== tip) t.classList.remove("show");
    });

    tip.classList.toggle("show");
}

loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
