<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Observations</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 10px;
        background: #f4f6f8;
    }

    h2 {
        text-align: center;
        margin-bottom: 5px;
    }

    .status {
        text-align: center;
        margin-bottom: 10px;
        font-size: 14px;
        color: #666;
    }

    .table-container {
        overflow-x: auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 800px;
    }

    th, td {
        padding: 8px 10px;
        border-bottom: 1px solid #eee;
        text-align: left;
        white-space: nowrap;
    }

    th {
        background: #0077cc;
        color: white;
        position: sticky;
        top: 0;
        z-index: 1;
    }

    tr:hover {
        background: #f1f7ff;
    }

    tr:nth-child(even) {
        background: #fafafa;
    }

    .fresh {
        background: #e6ffed !important;
    }

    @media (max-width: 768px) {
        body {
            font-size: 12px;
        }

        th, td {
            padding: 6px;
        }
    }
</style>

</head>

<body>

<h2>Weather Observations</h2>
<div class="status" id="status">Loading data...</div>

<div class="table-container">
    <table>
        <thead>
            <tr id="tableHead"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function formatTime(val) {
    try {
        let d;

        if (!isNaN(val)) {
            // epoch seconds → ms
            d = new Date(parseFloat(val) * 1000);
        } else {
            d = new Date(val);
        }

        return isNaN(d) ? "Invalid Date" : d.toLocaleString();
    } catch {
        return "Invalid Date";
    }
}

async function loadData() {
    const status = document.getElementById("status");

    try {
        const response = await fetch("http://localhost:5000/observations");
        const data = await response.json();

        console.log("API Data:", data);

        const tableHead = document.getElementById("tableHead");
        const tableBody = document.getElementById("tableBody");

        if (!data || data.length === 0) {
            tableBody.innerHTML = "<tr><td>No data available</td></tr>";
            status.innerText = "No data returned from API";
            return;
        }

        const now = Date.now();

        // Sort newest observation first
        const sorted = data.sort((a, b) => {
            const t1 = new Date(a.ObsTimestamp || 0);
            const t2 = new Date(b.ObsTimestamp || 0);
            return t2 - t1;
        });

        // Add Age column
        const enhanced = sorted.map(row => {
            let ts = row.Timestamp;
            let age = "";

            if (!isNaN(ts)) {
                const diff = now - (parseFloat(ts) * 1000);
                const mins = Math.floor(diff / 60000);
                age = mins < 1 ? "just now" : `${mins} min ago`;
            }

            return { ...row, Age: age };
        });

        const headers = Object.keys(enhanced[0]);

        // Build header
        tableHead.innerHTML = headers.map(h => `<th>${h}</th>`).join("");

        // Build rows
        tableBody.innerHTML = enhanced.map(row => {
            const isFresh = row.Age.includes("just") || row.Age.startsWith("0");

            return `
                <tr class="${isFresh ? 'fresh' : ''}">
                    ${headers.map(h => {
                        let val = row[h];

                        if (h.toLowerCase().includes("time") && val) {
                            val = formatTime(val);
                        }

                        return `<td>${val ?? ""}</td>`;
                    }).join("")}
                </tr>
            `;
        }).join("");

        status.innerText = `Last updated: ${new Date().toLocaleTimeString()}`;

    } catch (err) {
        console.error("Error loading data:", err);
        document.getElementById("tableBody").innerHTML =
            "<tr><td>Error loading data</td></tr>";
        status.innerText = "Error connecting to API";
    }
}

// Load + refresh
loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
