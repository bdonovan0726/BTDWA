<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Observations</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 10px;
        background: #f4f6f8;
    }

    h2 {
        text-align: center;
        margin-bottom: 5px;
    }

    .status {
        text-align: center;
        margin-bottom: 15px;
        font-size: 14px;
        color: #666;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    .station-card {
        width: 100%;
        max-width: 500px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .station-header {
        background: #0077cc;
        color: white;
        font-weight: bold;
        padding: 10px;
        text-align: center;
        font-size: 15px;
        cursor: pointer;
        position: relative;
    }

    .station-header .sub {
        display: block;
        font-weight: normal;
        font-size: 13px;
        opacity: 0.9;
        margin-top: 2px;
    }

    .tooltip {
        position: absolute;
        bottom: -55px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: white;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;
        opacity: 0;
        pointer-events: none;
        transition: 0.2s;
    }

    .station-header:hover .tooltip {
        opacity: 1;
    }

    .tooltip.show {
        opacity: 1;
    }

    .station-content {
        display: none;
    }

    .station-card.active .station-content {
        display: block;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td {
        padding: 8px 10px;
        border-bottom: 1px solid #eee;
    }

    td:first-child {
        font-weight: 600;
        color: #555;
    }

    td:last-child {
        text-align: right;
    }
</style>

</head>

<body>

<h2>Weather Observations</h2>
<div class="status" id="status">Loading data...</div>
<div class="container" id="container"></div>

<script>
function formatTemp(c) {
    if (c == null) return "";
    return `${Math.round(c)}°C / ${Math.round((c * 9/5) + 32)}°F`;
}

function formatTime(val) {
    let d = !isNaN(val)
        ? new Date(parseFloat(val) * 1000)
        : new Date(val);
    return isNaN(d) ? "" : d.toLocaleString();
}

async function loadData() {
    const res = await fetch("http://localhost:5000/observations");
    const data = await res.json();

    const container = document.getElementById("container");

    container.innerHTML = data.map(row => {

        const summaryTemp = formatTemp(row.Temp);

        const rows = Object.entries(row)
            .filter(([k]) => !["StationID","StationName","StationComments"].includes(k))
            .map(([k,v]) => {

                const key = k.toLowerCase();

                if (key.includes("time")) v = formatTime(v);
                if (key === "humidity") v = `${Math.round(v)}%`;
                if (key.includes("wind")) v = `${Math.round(v * 2.237)} mph`;
                if (key === "pressure") v = `${Math.round(v)} hPa`;
                if (key.includes("temp") || key.includes("heat") || key.includes("chill"))
                    v = formatTemp(v);

                return `<tr><td>${k}</td><td>${v ?? ""}</td></tr>`;
            }).join("");

        return `
            <div class="station-card">
                <div class="station-header" onclick="toggleCard(this)">
                    ${row.StationName}
                    <span class="sub">${row.Desc || ""} — ${summaryTemp}</span>
                    <div class="tooltip">${row.StationComments || ""}</div>
                </div>
                <div class="station-content">
                    <table>${rows}</table>
                </div>
            </div>
        `;
    }).join("");

    document.getElementById("status").innerText =
        "Last updated: " + new Date().toLocaleTimeString();
}

function toggleCard(el) {
    const card = el.parentElement;

    document.querySelectorAll(".station-card").forEach(c => {
        if (c !== card) c.classList.remove("active");
    });

    card.classList.toggle("active");

    const tip = el.querySelector(".tooltip");
    tip.classList.toggle("show");

    setTimeout(() => tip.classList.remove("show"), 3000);
}

loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
